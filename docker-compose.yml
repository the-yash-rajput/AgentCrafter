services:
  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-p", "5733"]
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph_secret
      POSTGRES_DB: langgraph_builder_2
    ports:
      - "${POSTGRES_HOST_PORT:-5733}:5733"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph -d langgraph_builder_2 -p 5733"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
      - "${BACKEND_DEBUGPY_PORT:-5678}:${BACKEND_DEBUGPY_PORT:-5678}"
    environment:
      DATABASE_URL: postgresql://langgraph:langgraph_secret@postgres:5733/langgraph_builder_2
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      BACKEND_RELOAD: ${BACKEND_RELOAD:-true}
      BACKEND_DEBUGPY: ${BACKEND_DEBUGPY:-false}
      BACKEND_DEBUGPY_HOST: ${BACKEND_DEBUGPY_HOST:-0.0.0.0}
      BACKEND_DEBUGPY_PORT: ${BACKEND_DEBUGPY_PORT:-5678}
      BACKEND_DEBUGPY_WAIT_FOR_CLIENT: ${BACKEND_DEBUGPY_WAIT_FOR_CLIENT:-false}
      BACKEND_DEBUGPY_SUBPROCESS: ${BACKEND_DEBUGPY_SUBPROCESS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh /app/start-backend.sh

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
